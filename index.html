<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライフアプリ操作ガイド</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #fff7e8 0%, #ffe0a8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
}

.wrapper {
  width: 100%;
  max-width: 520px;
  padding: 22px;
}

.card {
  background: #fff;
  border-radius: 26px;
  padding: 32px 22px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.15);
  text-align: center;
}

.badge {
  display: inline-block;
  background: #ff8a00;
  color: #fff;
  font-weight: bold;
  padding: 7px 16px;
  border-radius: 999px;
  font-size: 14px;
  margin-bottom: 18px;
}

h1 {
  margin: 0;
  font-size: 30px;
  line-height: 1.35;
  color: #d66a1f;
}

.lead {
  font-size: 17px;
  line-height: 1.8;
  margin: 22px 0 28px;
}

.play-link {
  display: block;
  width: 100%;
  text-decoration: none;
  border-radius: 20px;
  background: #ff8a00;
  color: white;
  font-size: 24px;
  font-weight: bold;
  padding: 22px 12px;
  box-shadow: 0 7px 0 #c85f00;
}

.play-link:active {
  transform: translateY(4px);
  box-shadow: 0 3px 0 #c85f00;
}

.note {
  margin-top: 22px;
  font-size: 14px;
  color: #666;
  line-height: 1.7;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <div class="badge">動画でかんたん確認</div>

    <h1>ライフアプリ<br>かんたん操作ガイド</h1>

    <p class="lead">
      ダウンロードから<br>
      マイ店舗登録までを<br>
      動画で確認できます。
    </p>

    <a class="play-link"
       href="https://drive.google.com/file/d/1xweLNNs6gDXuDDvmexHpQDfiUfDCxeFv/view?usp=sharing"
       target="_blank">
      ▶ 動画を見る
    </a>

    <p class="note">
      ボタンを押すと動画ページが開きます。<br>
      再生ボタンを押してご覧ください。
    </p>
  </div>
</div>

</body>
</html>
