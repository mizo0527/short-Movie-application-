<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ライフアプリ ショート動画</title>
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #fff;
    font-family: system-ui, sans-serif;
  }
  .message {
    font-size: 18px;
    font-weight: bold;
    margin: 12px 0;
  }
  video {
    width: 100%;
    max-width: 430px;
    max-height: 85vh;
    background: #000;
  }
</style>
</head>
<body>

<div class="message">▶ 動画をタップして再生</div>

<video id="movie" controls playsinline preload="metadata">
  <source src="life_app_short.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("movie");

video.addEventListener("play", async () => {
  try {
    if (video.requestFullscreen) {
      await video.requestFullscreen();
    } else if (video.webkitEnterFullscreen) {
      video.webkitEnterFullscreen();
    }
  } catch (e) {
    console.log("Fullscreen failed:", e);
  }
});
</script>

</body>
</html>
