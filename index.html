<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライフアプリ操作ガイド</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #fff7e8 0%, #ffe0a8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
}

.wrapper {
  width: 100%;
  max-width: 520px;
  padding: 20px;
}

.card {
  background: #fff;
  border-radius: 24px;
  padding: 28px 22px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.15);
  text-align: center;
}

.badge {
  display: inline-block;
  background: #ff8a00;
  color: #fff;
  font-weight: bold;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 14px;
  margin-bottom: 14px;
}

h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.35;
  color: #e66a00;
}

.lead {
  font-size: 16px;
  line-height: 1.7;
  margin: 18px 0 24px;
}

.play-btn {
  width: 100%;
  border: none;
  border-radius: 18px;
  background: #ff8a00;
  color: white;
  font-size: 22px;
  font-weight: bold;
  padding: 18px 12px;
  cursor: pointer;
  box-shadow: 0 6px 0 #c85f00;
}

.play-btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #c85f00;
}

.note {
  margin-top: 18px;
  font-size: 13px;
  color: #666;
  line-height: 1.6;
}

.video-area {
  display: none;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  background: #000;
  z-index: 9999;
}

.video-area iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.back-btn {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10000;
  border: none;
  border-radius: 999px;
  background: rgba(255,255,255,0.9);
  color: #333;
  font-size: 14px;
  font-weight: bold;
  padding: 8px 12px;
}
</style>
</head>

<body>

<div class="wrapper" id="startScreen">
  <div class="card">
    <div class="badge">動画でかんたん確認</div>

    <h1>ライフアプリ<br>かんたん操作ガイド</h1>

    <p class="lead">
      ダウンロードから<br>
      マイ店舗登録までを<br>
      動画でわかりやすくご案内します。
    </p>

    <button class="play-btn" onclick="showVideo()">
      ▶ 動画を見る
    </button>

    <p class="note">
      再生ボタンを押してご覧ください。<br>
      ※端末によって全画面表示できない場合があります。
    </p>
  </div>
</div>

<div class="video-area" id="videoArea">
  <button class="back-btn" onclick="backToStart()">← 戻る</button>

  <iframe
    src="https://drive.google.com/file/d/1xweLNNs6gDXuDDvmexHpQDfiUfDCxeFv/preview"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>
</div>

<script>
function showVideo() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("videoArea").style.display = "block";
  document.body.style.overflow = "hidden";
}

function backToStart() {
  document.getElementById("videoArea").style.display = "none";
  document.getElementById("startScreen").style.display = "block";
  document.body.style.overflow = "";
}
</script>

</body>
</html>
