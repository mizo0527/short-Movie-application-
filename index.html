<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライフアプリ操作ガイド</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #fff7e8 0%, #ffe0a8 100%);
  color: #333;
  display: flex;
  justify-content: center;
}

.wrapper {
  width: 100%;
  max-width: 520px;
  padding: 18px 14px 24px;
  text-align: center;
}

.card {
  background: #fff;
  border-radius: 22px;
  padding: 18px 14px 20px;
  box-shadow: 0 8px 22px rgba(0,0,0,0.15);
}

.badge {
  display: inline-block;
  background: #ff8a00;
  color: #fff;
  font-weight: bold;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  margin-bottom: 10px;
}

h1 {
  margin: 0;
  font-size: 24px;
  line-height: 1.35;
  color: #e66a00;
}

.lead {
  font-size: 14px;
  line-height: 1.6;
  margin: 12px 0 14px;
}

.video-wrap {
  width: 40%;
  min-width: 190px;
  max-width: 240px;
  aspect-ratio: 9 / 16;
  margin: 0 auto;
  background: #000;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.note {
  margin-top: 12px;
  font-size: 13px;
  line-height: 1.6;
  color: #555;
  font-weight: bold;
}

.sub-note {
  margin-top: 8px;
  font-size: 12px;
  line-height: 1.5;
  color: #777;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <div class="badge">動画でかんたん確認</div>

    <h1>ライフアプリ<br>かんたん操作ガイド</h1>

    <p class="lead">
      ダウンロードからマイ店舗登録まで<br>
      動画で確認できます。
    </p>

    <div class="video-wrap">
      <iframe
        src="https://drive.google.com/file/d/1xweLNNs6gDXuDDvmexHpQDfiUfDCxeFv/preview"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>

    <div class="note">
      ▶ 動画内の再生ボタンを押してください
    </div>

    <div class="sub-note">
      大きく見たい場合は、動画右下の全画面ボタンを押してください。<br>
      ※端末によって全画面表示できない場合があります。
    </div>
  </div>
</div>

</body>
</html>
