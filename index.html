<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ライフアプリ動画マニュアル</title>

<script src="https://cdn.counter.dev/script.js"
        data-id="5cf4d8c5-5b3e-49b0-b18b-f738078276dc"
        data-utcoffset="9">
</script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(180deg, #fff7e8 0%, #ffe0a8 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
}

.wrapper {
  width: 100%;
  max-width: 520px;
  padding: 22px;
}

.card {
  background: #fff;
  border-radius: 26px;
  padding: 30px 22px;
  box-shadow: 0 10px 28px rgba(0,0,0,0.15);
  text-align: center;
}

.badge {
  display: inline-block;
  background: #ff8a00;
  color: #fff;
  font-weight: bold;
  padding: 7px 16px;
  border-radius: 999px;
  font-size: 14px;
  margin-bottom: 18px;
}

h1 {
  margin: 0;
  font-size: 30px;
  line-height: 1.35;
  color: #d66a1f;
}

.lead {
  font-size: 16px;
  line-height: 1.7;
  margin: 18px 0 24px;
}

/* ▼ キャラ＋メイン導線 */
.main-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 18px;
}

.character {
  width: 80px;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.link {
  display: block;
  text-decoration: none;
  border-radius: 20px;
  font-size: 20px;
  font-weight: bold;
  padding: 18px 12px;
  text-align: center;
}

.main {
  background: #ff8a00;
  color: #fff;
  box-shadow: 0 6px 0 #c85f00;
  flex: 1;
}

.sub {
  background: #fff1d6;
  color: #9a4b00;
  border: 2px solid #ffb44a;
  margin-top: 14px;
}

.link:active {
  transform: translateY(3px);
}

.char-text {
  font-size: 13px;
  margin-top: 6px;
  text-align: left;
}

.note {
  margin-top: 22px;
  font-size: 13px;
  color: #666;
  line-height: 1.7;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="badge">動画でかんたん確認</div>

    <h1>ライフアプリ<br>動画マニュアル</h1>

    <p class="lead">
      見たい内容を選んでください。<br>
      ボタンを押すと動画が開きます。
    </p>

    <!-- ▼ メイン導線 -->
    <div class="main-wrap">
      <img src="IMG_5790.png" class="character">

      <a class="link main"
         href="https://drive.google.com/file/d/1xweLNNs6gDXuDDvmexHpQDfiUfDCxeFv/view"
         target="_blank">
        ▶ まずはこちら
      </a>
    </div>

    <div class="char-text">
      👉 はじめての方はここから！
    </div>

    <!-- ▼ サブ導線 -->
    <a class="link sub"
       href="https://drive.google.com/file/d/1icUeIfiAywLxYd1Sic6qZGOvH_kTrE-j/view"
       target="_blank">
      モバイルLaCuCa ログインはこちら
    </a>

    <a class="link sub"
       href="https://drive.google.com/file/d/1iiyxKggvGwRwZqI0t3ZvrhpT29zVQ_1w/view"
       target="_blank">
      マイ店舗の変更・追加を見る
    </a>

    <p class="note">
      ※通信環境により、動画の読み込みに時間がかかる場合があります。
    </p>

  </div>
</div>

</body>
</html>
